worker_processes 1;
events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

# L4 (TCP) proxy: nginx forwards the raw connection and cannot inspect the
# payload — strictly a forward-only load balancer, and leaner than http mode
# (no HTTP parsing/buffering in nginx). Each client keep-alive connection maps
# to one upstream connection for its lifetime.
stream {
  upstream api {
    server api1:9999;
    server api2:9999;
  }
  server {
    listen 9999;
    proxy_pass api;
    proxy_connect_timeout 1s;
    proxy_timeout 5s;
  }
}
