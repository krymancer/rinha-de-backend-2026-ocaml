# TCP-mode load balancer: forward-only, round-robin across the two API
# instances. mode tcp means HAProxy never parses HTTP — it just splices the
# connection to a backend, so it adds no detection logic (per the rules) and
# minimal latency. Replaces the hand-rolled fd-passing LB, whose blocking
# send_fd fallback caused a ~3.6ms p99 tail under load.
global
    maxconn 16384
    nbthread 1

defaults
    mode tcp
    timeout connect 1000ms
    timeout client  65000ms
    timeout server  65000ms

frontend fraud_in
    bind *:9999
    default_backend fraud_api

backend fraud_api
    balance roundrobin
    server api1 api1:9999 check inter 1s rise 1 fall 3
    server api2 api2:9999 check inter 1s rise 1 fall 3
