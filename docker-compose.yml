services:
  api1: &api
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml:latest
    platform: linux/amd64
    # TCP mode: no FD_UDS, so the server binds TCP :9999 directly. HAProxy
    # round-robins to api1:9999 / api2:9999 over the bridge network.
    environment:
      INDEX_PATH: /app/index.bin
      API_WARMUP_QUERIES: "8192"
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "165M"

  api2:
    <<: *api
    environment:
      INDEX_PATH: /app/index.bin
      API_WARMUP_QUERIES: "8192"

  lb:
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml-lb:latest
    platform: linux/amd64
    ports: ["9999:9999"]
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    depends_on:
      api1: { condition: service_started }
      api2: { condition: service_started }
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "20M"

networks:
  default:
    driver: bridge
