services:
  api1: &api
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml:latest
    platform: linux/amd64
    cpuset: "0"          # pin to a dedicated core: kills scheduler-migration jitter
    environment:
      INDEX_PATH: /app/index.bin
      FD_UDS: /sockets/api1.sock
      API_WARMUP_QUERIES: "8192"
      EPOLL_SPIN_US: "150"   # busy-poll before blocking: keep the core in C0, dodge the idle-wake tail
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165M"

  api2:
    <<: *api
    cpuset: "1"          # dedicated core, separate from api1 and the LB
    environment:
      INDEX_PATH: /app/index.bin
      FD_UDS: /sockets/api2.sock
      API_WARMUP_QUERIES: "8192"
      EPOLL_SPIN_US: "150"   # busy-poll before blocking: keep the core in C0, dodge the idle-wake tail

  lb:
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml-lb:latest
    platform: linux/amd64
    cpuset: "2,3"        # LB gets its own cores; never contends with the APIs
    ports: ["9999:9999"]
    environment:
      LB_PORT: "9999"
      API_SOCKETS: /sockets/api1.sock,/sockets/api2.sock
    volumes:
      - sockets:/sockets
    depends_on:
      api1: { condition: service_started }
      api2: { condition: service_started }
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20M"

networks:
  default:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m"
