services:
  api1: &api
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml:latest
    platform: linux/amd64
    expose: ["9999"]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9999 && printf 'GET /ready HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  api2: *api

  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports: ["9999:9999"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1: { condition: service_healthy }
      api2: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10M"

networks:
  default:
    driver: bridge
