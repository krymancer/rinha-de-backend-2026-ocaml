services:
  api1: &api
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml:latest
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    # No cpuset: with only 2 physical cores (4 HT threads) on the grader, pinning
    # the LB to threads 2,3 made them HT-siblings of the API cores 0,1 — so the LB
    # stole execution units from a busy API mid-query. Letting CFS schedule freely
    # (bounded by the cpus quota below) avoids that forced contention.
    environment:
      INDEX_PATH: /app/index.bin
      FD_UDS: /sockets/api1.sock
      API_WARMUP_QUERIES: "8192"
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "165M"

  api2:
    <<: *api
    environment:
      INDEX_PATH: /app/index.bin
      FD_UDS: /sockets/api2.sock
      API_WARMUP_QUERIES: "8192"

  lb:
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml-lb:latest
    build:
      context: .
      dockerfile: Dockerfile.lb
    platform: linux/amd64
    ports: ["9999:9999"]
    environment:
      LB_PORT: "9999"
      API_SOCKETS: /sockets/api1.sock,/sockets/api2.sock
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    volumes:
      - sockets:/sockets
    depends_on:
      api1: { condition: service_started }
      api2: { condition: service_started }
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "20M"

networks:
  default:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m"
