services:
  api1: &api
    image: ghcr.io/${GITHUB_REPOSITORY:-krymancer/rinha-de-backend-2026-ocaml}:latest
    platform: linux/amd64
    expose: ["9999"]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "159M"

  api2: *api

  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports: ["9999:9999"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api1, api2]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "32M"

networks:
  default:
    driver: bridge
