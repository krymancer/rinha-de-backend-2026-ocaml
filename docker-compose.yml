services:
  api1:
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml:latest
    platform: linux/amd64
    environment:
      SOCKET_PATH: "/sockets/api1.sock"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "test", "-S", "/sockets/api1.sock"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  api2:
    image: ghcr.io/krymancer/rinha-de-backend-2026-ocaml:latest
    platform: linux/amd64
    environment:
      SOCKET_PATH: "/sockets/api2.sock"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "test", "-S", "/sockets/api2.sock"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports: ["9999:9999"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api1: { condition: service_healthy }
      api2: { condition: service_healthy }
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10M"

volumes:
  sockets:

networks:
  default:
    driver: bridge
